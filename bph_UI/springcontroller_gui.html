<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Controller GUI</title>
<script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;padding:1rem}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:14px;font-weight:500;margin-bottom:8px;color:#555}
.panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#666}
.field input{width:110px;padding:6px 8px;border:1px solid #ccc;border-radius:8px;font-size:13px}
.field input.wide{width:160px}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:7px 14px;border:1px solid #ccc;border-radius:8px;background:#fff}
button:hover{background:#f0f0f0}
button:active{transform:scale(0.98)}
.btn-danger{background:#fff0f0;color:#a32d2d;border-color:#f7c1c1}
.btn-danger:hover{background:#fde8e8}
.btn-success{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.btn-success:hover{background:#daeec8}
.status-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-right:6px;flex-shrink:0}
.status-dot.connected{background:#3b6d11}
.status-dot.error{background:#a32d2d}
.status-dot.warn{background:#854f0b}
.spring-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:6px;background:#f9f9f7}
.spring-item:last-child{margin-bottom:0}
.spring-name{flex:1;font-weight:500;font-size:13px}
.log{font-family:monospace;font-size:11px;background:#f9f9f7;border:1px solid #e0e0e0;border-radius:8px;padding:8px;height:120px;overflow-y:auto;color:#555}
.log p{margin:1px 0;line-height:1.5}
.log .err{color:#a32d2d}
.log .ok{color:#3b6d11}
.log .info{color:#185fa5}
.conn-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f0f0ee;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.conn-bar input{width:200px;padding:6px 8px;border:1px solid #ccc;border-radius:8px;font-size:13px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
select{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;width:160px}
.section-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.empty-state{font-size:13px;color:#aaa;padding:12px;text-align:center;border:1px dashed #ddd;border-radius:8px}
</style>
</head>
<body>
<h2>Spring controller</h2>

<div class="conn-bar">
  <span class="status-dot" id="dot"></span>
  <span id="conn-label" style="font-size:13px;color:#666">Disconnected</span>
  <input type="text" id="ws-url" value="ws://localhost:9090" placeholder="ws://localhost:9090" />
  <button id="btn-connect">Connect</button>
  <button id="btn-disconnect">Disconnect</button>
</div>

<div class="top-actions">
  <button id="btn-launch">Launch visualization</button>
  <button id="btn-enable" class="btn-success">Enable springs</button>
  <button id="btn-disable" class="btn-danger">Disable springs</button>
</div>

<div class="grid2">
  <div>
    <div class="panel">
      <div class="section-title">Active springs</div>
      <div id="spring-list"><div class="empty-state">No springs detected yet</div></div>
    </div>

    <div class="panel">
      <div class="section-title">Adjust spring parameters</div>
      <p style="font-size:12px;color:#888;margin-bottom:8px">Removes and re-adds the spring with new values.</p>
      <div class="row">
        <div class="field"><label>Spring</label>
          <select id="adj-name"><option value="">— select —</option></select>
        </div>
        <div class="field"><label>Stiffness</label><input type="number" id="adj-k" value="50.0" step="0.1"></div>
        <div class="field"><label>Damping</label><input type="number" id="adj-d" value="0.0" step="0.1"></div>
      </div>
      <div class="row">
        <div class="field"><label>Rest length (m)</label><input type="number" id="adj-rl" value="0.0" step="0.01"></div>
        <div class="field"><label>Inner radius</label><input type="number" id="adj-ir" value="0.0" step="0.01"></div>
        <div class="field"><label>Outer radius</label><input type="number" id="adj-or" value="0.0" step="0.01"></div>
      </div>
      <div class="row">
        <div class="field"><label>Link name</label><input type="text" id="adj-link" value="ur3e_tool0" class="wide"></div>
      </div>
      <div class="row">
        <div class="field"><label>Local pt x</label><input type="number" id="adj-lpx" value="0.0" step="0.01"></div>
        <div class="field"><label>y</label><input type="number" id="adj-lpy" value="0.0" step="0.01"></div>
        <div class="field"><label>z</label><input type="number" id="adj-lpz" value="0.0" step="0.01"></div>
      </div>
      <div class="row">
        <div class="field"><label>Target x</label><input type="number" id="adj-tx" value="0.2" step="0.01"></div>
        <div class="field"><label>y</label><input type="number" id="adj-ty" value="0.1" step="0.01"></div>
        <div class="field"><label>z</label><input type="number" id="adj-tz" value="0.4" step="0.01"></div>
      </div>
      <div class="row" style="margin-top:4px">
        <button id="btn-adjust">Apply changes</button>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="section-title">Add spring</div>
      <div class="row">
        <div class="field"><label>Name</label><input type="text" id="add-name" value="my_spring" class="wide"></div>
        <div class="field"><label>Link name</label><input type="text" id="add-link" value="ur3e_tool0" class="wide"></div>
      </div>
      <div class="row">
        <div class="field"><label>Local pt x</label><input type="number" id="add-lpx" value="0.0" step="0.01"></div>
        <div class="field"><label>y</label><input type="number" id="add-lpy" value="0.0" step="0.01"></div>
        <div class="field"><label>z</label><input type="number" id="add-lpz" value="0.0" step="0.01"></div>
      </div>
      <div class="row">
        <div class="field"><label>Target x</label><input type="number" id="add-tx" value="0.2" step="0.01"></div>
        <div class="field"><label>y</label><input type="number" id="add-ty" value="0.1" step="0.01"></div>
        <div class="field"><label>z</label><input type="number" id="add-tz" value="0.4" step="0.01"></div>
      </div>
      <div class="row">
        <div class="field"><label>Stiffness</label><input type="number" id="add-k" value="50.0" step="0.1"></div>
        <div class="field"><label>Damping</label><input type="number" id="add-d" value="0.0" step="0.1"></div>
      </div>
      <div class="row">
        <div class="field"><label>Rest length</label><input type="number" id="add-rl" value="0.0" step="0.01"></div>
        <div class="field"><label>Inner radius</label><input type="number" id="add-ir" value="0.0" step="0.01"></div>
        <div class="field"><label>Outer radius</label><input type="number" id="add-or" value="0.0" step="0.01"></div>
      </div>
      <div class="row" style="margin-top:4px">
        <button id="btn-add">Add spring</button>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Move spring target</div>
      <div class="row">
        <div class="field"><label>Spring</label>
          <select id="move-name"><option value="">— select —</option></select>
        </div>
        <div class="field"><label>Frame</label><input type="text" id="move-frame" value="world" style="width:90px"></div>
      </div>
      <div class="row">
        <div class="field"><label>x</label><input type="number" id="move-x" value="0.0" step="0.01"></div>
        <div class="field"><label>y</label><input type="number" id="move-y" value="0.0" step="0.01"></div>
        <div class="field"><label>z</label><input type="number" id="move-z" value="0.0" step="0.01"></div>
      </div>
      <div class="row" style="margin-top:4px">
        <button id="btn-move-target">Publish target</button>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Activity log</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<script>
let ros = null;
let springs = [];
let enableClient = null;
let addClient = null;
let removeClient = null;
let springsUpdatedSub = null;

const dot = document.getElementById('dot');
const connLabel = document.getElementById('conn-label');
const logEl = document.getElementById('log');
const springList = document.getElementById('spring-list');

function log(msg, cls=''){
  const p = document.createElement('p');
  if(cls) p.className = cls;
  p.textContent = new Date().toTimeString().slice(0,8) + '  ' + msg;
  logEl.appendChild(p);
  logEl.scrollTop = logEl.scrollHeight;
}

function setConnected(ok, msg){
  dot.className = 'status-dot' + (ok ? ' connected' : ' error');
  connLabel.textContent = msg;
}

function buildSpringItem(name){
  const div = document.createElement('div');
  div.className = 'spring-item';
  div.id = 'spring-'+name;
  div.innerHTML = `<span class="spring-name">${name}</span>
    <button class="btn-danger" style="padding:4px 10px;font-size:12px" onclick="removeSpring('${name}')">Remove</button>`;
  return div;
}

function refreshSpringSelects(){
  ['adj-name','move-name'].forEach(id=>{
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">— select —</option>';
    springs.forEach(s=>{
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      if(s===cur) o.selected = true;
      sel.appendChild(o);
    });
  });
}

function updateSpringList(names){
  springs = names;
  springList.innerHTML = '';
  if(!names.length){
    springList.innerHTML = '<div class="empty-state">No active springs</div>';
  } else {
    names.forEach(n => springList.appendChild(buildSpringItem(n)));
  }
  refreshSpringSelects();
}

function connect(){
  const url = document.getElementById('ws-url').value.trim();
  if(ros){ ros.close(); }
  ros = new ROSLIB.Ros({ url });
  ros.on('connection',()=>{
    setConnected(true,'Connected to '+url);
    log('Connected to rosbridge at '+url,'ok');
    setupClients();
    subscribeToSprings();
  });
  ros.on('error',e=>{
    setConnected(false,'Connection error');
    log('Connection error: '+(e.message||e),'err');
  });
  ros.on('close',()=>{
    dot.className='status-dot warn';
    connLabel.textContent='Disconnected';
    log('Disconnected');
  });
}

function setupClients(){
  enableClient = new ROSLIB.Service({ros, name:'/virtual_spring_node/enable', serviceType:'std_srvs/srv/SetBool'});
  addClient    = new ROSLIB.Service({ros, name:'/virtual_spring_node/add_spring', serviceType:'springcontroller_interfaces/srv/AddSpring'});
  removeClient = new ROSLIB.Service({ros, name:'/virtual_spring_node/remove_spring', serviceType:'springcontroller_interfaces/srv/RemoveSpring'});
}

function subscribeToSprings(){
  if(springsUpdatedSub) springsUpdatedSub.unsubscribe();
  springsUpdatedSub = new ROSLIB.Topic({ros, name:'/virtual_spring_node/springs_updated', messageType:'std_msgs/msg/String'});
  springsUpdatedSub.subscribe(msg=>{
    try{
      const names = JSON.parse(msg.data);
      updateSpringList(names);
      log('Springs updated: ['+names.join(', ')+']','info');
    }catch(e){ log('Failed to parse springs_updated: '+msg.data,'err'); }
  });
}

function callEnable(val){
  if(!enableClient){ log('Not connected','err'); return; }
  enableClient.callService(new ROSLIB.ServiceRequest({data:val}), res=>{
    log('Enable='+val+' → '+res.message,(res.success?'ok':'err'));
  }, err=>log('Service error: '+err,'err'));
}

function removeSpring(name){
  if(!removeClient){ log('Not connected','err'); return; }
  removeClient.callService(new ROSLIB.ServiceRequest({name}), res=>{
    log('Remove "'+name+'" → '+(res.success?'ok':res.message),(res.success?'ok':'err'));
    if(res.success){
      springs = springs.filter(s=>s!==name);
      const el = document.getElementById('spring-'+name);
      if(el) el.remove();
      if(!springs.length) springList.innerHTML='<div class="empty-state">No active springs</div>';
      refreshSpringSelects();
    }
  }, err=>log('Service error: '+err,'err'));
}

function addSpring(params){
  if(!addClient){ log('Not connected','err'); return; }
  addClient.callService(new ROSLIB.ServiceRequest(params), res=>{
    log('Add "'+params.name+'" → '+(res.success?'ok':res.message),(res.success?'ok':'err'));
    if(res.success && !springs.includes(params.name)){
      springs.push(params.name);
      const emptyEl = springList.querySelector('.empty-state');
      if(emptyEl) emptyEl.remove();
      springList.appendChild(buildSpringItem(params.name));
      refreshSpringSelects();
    }
  }, err=>log('Service error: '+err,'err'));
}

function v(id){ return parseFloat(document.getElementById(id).value)||0; }
function s(id){ return document.getElementById(id).value.trim(); }

document.getElementById('btn-connect').onclick    = connect;
document.getElementById('btn-disconnect').onclick = ()=>{ if(ros) ros.close(); };
document.getElementById('btn-launch').onclick     = ()=>{
  log('Launch command: ros2 launch springcontroller virtual_spring.launch.py');
  log('Opening http://localhost:8080 in new tab','info');
  window.open('http://localhost:8080','_blank');
};
document.getElementById('btn-enable').onclick  = ()=> callEnable(true);
document.getElementById('btn-disable').onclick = ()=> callEnable(false);

document.getElementById('btn-add').onclick = ()=>{
  addSpring({
    name: s('add-name'), link_name: s('add-link'),
    local_point: [v('add-lpx'),v('add-lpy'),v('add-lpz')],
    target:      [v('add-tx'),v('add-ty'),v('add-tz')],
    stiffness: v('add-k'), damping: v('add-d'),
    rest_length: v('add-rl'), inner_radius: v('add-ir'), outer_radius: v('add-or')
  });
};

document.getElementById('btn-adjust').onclick = ()=>{
  const name = s('adj-name');
  if(!name){ log('Select a spring to adjust','err'); return; }
  if(!removeClient){ log('Not connected','err'); return; }
  const params = {
    name, link_name: s('adj-link'),
    local_point: [v('adj-lpx'),v('adj-lpy'),v('adj-lpz')],
    target:      [v('adj-tx'),v('adj-ty'),v('adj-tz')],
    stiffness: v('adj-k'), damping: v('adj-d'),
    rest_length: v('adj-rl'), inner_radius: v('adj-ir'), outer_radius: v('adj-or')
  };
  log('Adjusting "'+name+'": removing first…','info');
  removeClient.callService(new ROSLIB.ServiceRequest({name}), res=>{
    log('Remove "'+name+'" → '+(res.success?'ok':res.message),(res.success?'ok':'err'));
    if(res.success){
      springs = springs.filter(s=>s!==name);
      const el = document.getElementById('spring-'+name);
      if(el) el.remove();
      if(!springs.length) springList.innerHTML='<div class="empty-state">No active springs</div>';
      refreshSpringSelects();
      setTimeout(()=> addSpring(params), 200);
    }
  }, err=>log('Service error: '+err,'err'));
};

document.getElementById('btn-move-target').onclick = ()=>{
  const name = document.getElementById('move-name').value;
  if(!name){ log('Select a spring','err'); return; }
  if(!ros || !ros.isConnected){ log('Not connected','err'); return; }
  const topic = new ROSLIB.Topic({ros, name:'/virtual_spring_node/target/'+name, messageType:'geometry_msgs/msg/PointStamped'});
  topic.publish(new ROSLIB.Message({
    header:{frame_id: s('move-frame'), stamp:{sec:0,nanosec:0}},
    point:{x:v('move-x'),y:v('move-y'),z:v('move-z')}
  }));
  log('Published target for "'+name+'": ['+[v('move-x'),v('move-y'),v('move-z')].map(n=>n.toFixed(3)).join(', ')+']','ok');
};

log('GUI ready. Enter rosbridge URL and click Connect.');
</script>
</body>
</html>
