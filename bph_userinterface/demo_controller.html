<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Controller</title>
<script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;padding:1rem}
.page{display:none}
.page.active{display:block}
.panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:1rem;font-size:13px;color:#666}
.breadcrumb span{color:#aaa}
.breadcrumb a{color:#185fa5;cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.big-btn{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:1.25rem 1.5rem;border:1px solid #ddd;border-radius:12px;background:#fff;cursor:pointer;width:100%;text-align:left}
.big-btn:hover{background:#f5f5f3}
.big-btn:active{transform:scale(0.99)}
.big-btn .title{font-size:16px;font-weight:500}
.big-btn .desc{font-size:12px;color:#666}
.big-btn .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.supply-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #e0e0e0;border-radius:12px;cursor:pointer;background:#fff;margin-bottom:8px}
.supply-card:hover,.supply-card.selected{border-color:#378add;background:#e6f1fb}
.supply-card:hover .supply-name,.supply-card.selected .supply-name{color:#185fa5}
.supply-name{font-weight:500;font-size:14px;flex:1}
.supply-loc{font-size:12px;color:#666;font-family:monospace}
.supply-id{font-size:11px;color:#aaa;font-family:monospace}
.mode-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid #e0e0e0;border-radius:12px;cursor:pointer;background:#fff;margin-bottom:8px}
.mode-card:hover{background:#f5f5f3}
.mode-card.active-mode{border:2px solid #378add;background:#e6f1fb}
.mode-card.active-mode .mode-name{color:#185fa5}
.mode-name{font-weight:500;font-size:14px}
.mode-desc{font-size:12px;color:#666;margin-top:2px}
.mode-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.log{font-family:monospace;font-size:11px;background:#f9f9f7;border:1px solid #e0e0e0;border-radius:8px;padding:8px;max-height:90px;overflow-y:auto;color:#555}
.log p{margin:1px 0;line-height:1.5}
.log .ok{color:#3b6d11}
.log .err{color:#a32d2d}
.log .info{color:#185fa5}
.conn-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f0f0ee;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.conn-bar input{padding:6px 8px;border:1px solid #ccc;border-radius:8px;font-size:13px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;flex-shrink:0}
.status-dot.connected{background:#3b6d11}
.status-dot.error{background:#a32d2d}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.field input{padding:6px 8px;border:1px solid #ccc;border-radius:8px;font-size:13px}
.confirm-box{background:#f5f5f3;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;margin:12px 0}
.confirm-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid #eee}
.confirm-row:last-child{border-bottom:none}
.confirm-label{color:#666}
.confirm-val{font-family:monospace;font-size:12px;color:#1a1a1a}
.section-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:7px 14px;border:1px solid #ccc;border-radius:8px;background:#fff}
button:hover{background:#f0f0f0}
button:active{transform:scale(0.98)}
</style>
</head>
<body>

<div class="conn-bar">
  <span class="status-dot" id="dot2"></span>
  <span id="conn-label2" style="font-size:13px;color:#666">Disconnected</span>
  <input type="text" id="ws-url2" value="ws://localhost:9090" style="width:190px" />
  <button id="btn-connect2">Connect</button>
  <button id="btn-disconnect2">Disconnect</button>
</div>

<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
  <div class="field" style="flex:1;min-width:180px">
    <label>Navigation topic</label>
    <input type="text" id="topic-nav" value="/demo/supply_location" style="width:100%">
  </div>
  <div class="field" style="flex:1;min-width:180px">
    <label>Camera ID topic</label>
    <input type="text" id="topic-cam" value="/demo/supply_target_id" style="width:100%">
  </div>
  <div class="field" style="flex:1;min-width:180px">
    <label>Arm mode topic</label>
    <input type="text" id="topic-mode" value="/demo/arm_control_mode" style="width:100%">
  </div>
</div>

<div id="page-home" class="page active">
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px">
    <button class="big-btn" onclick="showPage('page-supply')">
      <div class="icon" style="background:#e6f1fb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="5" width="14" height="10" rx="2" stroke="#185fa5" stroke-width="1.2"/><path d="M6 5V4a3 3 0 016 0v1" stroke="#185fa5" stroke-width="1.2"/><path d="M6 9h6M9 7v4" stroke="#185fa5" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
      <span class="title">Request supplies</span>
      <span class="desc">Send mobile robot to retrieve a supply item</span>
    </button>
    <button class="big-btn" onclick="showPage('page-mode')">
      <div class="icon" style="background:#faeeda">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6" stroke="#854f0b" stroke-width="1.2"/><path d="M9 6v3l2 2" stroke="#854f0b" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
      <span class="title">Change arm control mode</span>
      <span class="desc">Switch the arm state machine controller mode</span>
    </button>
  </div>
  <div class="panel" style="padding:0.75rem 1rem">
    <div class="section-title">Activity</div>
    <div class="log" id="log2"><p>Ready. Connect to rosbridge to publish.</p></div>
  </div>
</div>

<div id="page-supply" class="page">
  <div class="breadcrumb">
    <a onclick="showPage('page-home')">Home</a>
    <span>/</span>
    <span>Request supplies</span>
  </div>
  <div class="panel">
    <div class="section-title">Select a supply item</div>
    <div id="supply-list"></div>
  </div>
  <div id="supply-confirm" style="display:none">
    <div class="confirm-box" id="supply-confirm-box"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button id="btn-send-supply" style="flex:1">Send request</button>
      <button onclick="clearSupplySelection()" style="flex:1">Clear</button>
    </div>
  </div>
  <div class="panel" style="padding:0.75rem 1rem;margin-top:12px">
    <div class="log" id="log-supply"><p>Select an item above to preview.</p></div>
  </div>
</div>

<div id="page-mode" class="page">
  <div class="breadcrumb">
    <a onclick="showPage('page-home')">Home</a>
    <span>/</span>
    <span>Arm control mode</span>
  </div>
  <div class="panel">
    <div class="section-title">Current mode</div>
    <div style="font-size:15px;font-weight:500;margin-bottom:14px" id="current-mode-label">— none sent yet —</div>
    <div class="section-title">Select mode</div>
    <div id="mode-list"></div>
  </div>
  <div class="panel" style="padding:0.75rem 1rem">
    <div class="log" id="log-mode"><p>Select a mode to publish it.</p></div>
  </div>
</div>

<script>
let ros2 = null;

const supplies = [
  {name:'Bandage roll',    location:[1.2, 0.5, 0.0],  id:'SUPPLY_BANDAGE_001',    shelf:'Shelf A-2'},
  {name:'Saline solution', location:[2.1,-0.8, 0.0],  id:'SUPPLY_SALINE_002',     shelf:'Shelf B-1'},
  {name:'Surgical gloves', location:[0.4, 1.3, 0.0],  id:'SUPPLY_GLOVES_003',     shelf:'Shelf A-4'},
  {name:'Antiseptic wipe', location:[3.0, 0.2, 0.0],  id:'SUPPLY_ANTISEPTIC_004', shelf:'Shelf C-1'},
  {name:'Sample container',location:[1.8, 2.0, 0.0],  id:'SUPPLY_CONTAINER_005',  shelf:'Shelf B-3'},
];

const modes = [
  {key:'springcontroller', label:'Activate springcontroller',   desc:'Enable virtual spring force control on the arm', dotColor:'#185fa5'},
  {key:'plan_to_location', label:'Plan to location',            desc:'Use motion planning to reach a target pose',     dotColor:'#3b6d11'},
  {key:'teleoperate',      label:'Teleoperate to location',     desc:'Manual teleoperation mode',                      dotColor:'#854f0b'},
  {key:'hold_position',    label:'Hold current joint position', desc:'Lock all joints at current position',            dotColor:'#a32d2d'},
];

let selectedSupply = null;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function log2(el, msg, cls=''){
  const p = document.createElement('p');
  if(cls) p.className = cls;
  p.textContent = new Date().toTimeString().slice(0,8)+'  '+msg;
  el.appendChild(p);
  el.scrollTop = el.scrollHeight;
}

function logAll(msg, cls=''){
  ['log2','log-supply','log-mode'].forEach(id=>log2(document.getElementById(id),msg,cls));
}

function buildSupplyList(){
  const container = document.getElementById('supply-list');
  supplies.forEach((s,i)=>{
    const card = document.createElement('div');
    card.className = 'supply-card';
    card.id = 'supply-card-'+i;
    card.innerHTML = `<div style="flex:1">
      <div class="supply-name">${s.name}</div>
      <div class="supply-loc">${s.shelf} &nbsp;&middot;&nbsp; [${s.location.map(v=>v.toFixed(1)).join(', ')}]</div>
      <div class="supply-id">${s.id}</div>
    </div>
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="#aaa" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    card.onclick = ()=> selectSupply(i);
    container.appendChild(card);
  });
}

function selectSupply(i){
  selectedSupply = i;
  document.querySelectorAll('.supply-card').forEach((c,j)=>c.classList.toggle('selected',j===i));
  const s = supplies[i];
  const box = document.getElementById('supply-confirm-box');
  box.innerHTML = `
    <div class="confirm-row"><span class="confirm-label">Item</span><span class="confirm-val">${s.name}</span></div>
    <div class="confirm-row"><span class="confirm-label">Shelf</span><span class="confirm-val">${s.shelf}</span></div>
    <div class="confirm-row"><span class="confirm-label">Nav target</span><span class="confirm-val">[${s.location.map(v=>v.toFixed(2)).join(', ')}]</span></div>
    <div class="confirm-row"><span class="confirm-label">Camera ID</span><span class="confirm-val">${s.id}</span></div>
    <div class="confirm-row"><span class="confirm-label">Nav topic</span><span class="confirm-val">${document.getElementById('topic-nav').value}</span></div>
    <div class="confirm-row"><span class="confirm-label">Cam topic</span><span class="confirm-val">${document.getElementById('topic-cam').value}</span></div>`;
  document.getElementById('supply-confirm').style.display = 'block';
  log2(document.getElementById('log-supply'),'Selected: '+s.name+' ('+s.id+')','info');
}

function clearSupplySelection(){
  selectedSupply = null;
  document.querySelectorAll('.supply-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('supply-confirm').style.display = 'none';
}

function buildModeList(){
  const container = document.getElementById('mode-list');
  modes.forEach(m=>{
    const card = document.createElement('div');
    card.className = 'mode-card';
    card.id = 'mode-card-'+m.key;
    card.innerHTML = `<div class="mode-dot" style="background:${m.dotColor}"></div>
      <div style="flex:1">
        <div class="mode-name">${m.label}</div>
        <div class="mode-desc">${m.desc}</div>
      </div>`;
    card.onclick = ()=> publishMode(m);
    container.appendChild(card);
  });
}

function publishMode(m){
  const topic = document.getElementById('topic-mode').value;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active-mode'));
  document.getElementById('mode-card-'+m.key).classList.add('active-mode');
  document.getElementById('current-mode-label').textContent = m.label;
  const logEl = document.getElementById('log-mode');
  if(!ros2 || !ros2.isConnected){
    log2(logEl,'[offline] Would publish "'+m.key+'" → '+topic,'info');
    log2(document.getElementById('log2'),'Arm mode (offline): '+m.label,'info');
    return;
  }
  const t = new ROSLIB.Topic({ros:ros2, name:topic, messageType:'std_msgs/msg/String'});
  t.publish(new ROSLIB.Message({data: m.key}));
  log2(logEl,'Published "'+m.key+'" → '+topic,'ok');
  log2(document.getElementById('log2'),'Arm mode: '+m.label,'ok');
}

document.getElementById('btn-send-supply').onclick = ()=>{
  if(selectedSupply===null) return;
  const s = supplies[selectedSupply];
  const navTopic = document.getElementById('topic-nav').value;
  const camTopic = document.getElementById('topic-cam').value;
  const logEl = document.getElementById('log-supply');
  if(!ros2 || !ros2.isConnected){
    log2(logEl,'[offline] Nav: '+navTopic+' → ['+s.location.map(v=>v.toFixed(2)).join(', ')+']','info');
    log2(logEl,'[offline] Cam: '+camTopic+' → '+s.id,'info');
    log2(document.getElementById('log2'),'Supply request (offline): '+s.name,'info');
    return;
  }
  const navT = new ROSLIB.Topic({ros:ros2, name:navTopic, messageType:'geometry_msgs/msg/Point'});
  navT.publish(new ROSLIB.Message({x:s.location[0], y:s.location[1], z:s.location[2]}));
  const camT = new ROSLIB.Topic({ros:ros2, name:camTopic, messageType:'std_msgs/msg/String'});
  camT.publish(new ROSLIB.Message({data: s.id}));
  log2(logEl,'Nav → ['+s.location.map(v=>v.toFixed(2)).join(', ')+'] on '+navTopic,'ok');
  log2(logEl,'Cam ID → '+s.id+' on '+camTopic,'ok');
  log2(document.getElementById('log2'),'Supply sent: '+s.name,'ok');
};

function connectRos2(){
  const url = document.getElementById('ws-url2').value.trim();
  if(ros2) ros2.close();
  ros2 = new ROSLIB.Ros({url});
  ros2.on('connection',()=>{
    document.getElementById('dot2').className='status-dot connected';
    document.getElementById('conn-label2').textContent='Connected';
    logAll('Connected to rosbridge at '+url,'ok');
  });
  ros2.on('error',e=>{
    document.getElementById('dot2').className='status-dot error';
    document.getElementById('conn-label2').textContent='Error';
    logAll('Connection error: '+(e.message||e),'err');
  });
  ros2.on('close',()=>{
    document.getElementById('dot2').className='status-dot';
    document.getElementById('conn-label2').textContent='Disconnected';
    logAll('Disconnected');
  });
}

document.getElementById('btn-connect2').onclick    = connectRos2;
document.getElementById('btn-disconnect2').onclick = ()=>{ if(ros2) ros2.close(); };

buildSupplyList();
buildModeList();
</script>
</body>
</html>
