# config/params.yaml

person_tracker:
  ros__parameters:

    # -------------------------------------------------------------------
    # Model
    # -------------------------------------------------------------------
    model_path: "yolov8n-pose.pt"
    confidence: 0.5
    device: "cpu"
    tracker: "bytetrack.yaml"
    publish_viz: true
    depth_enabled: false

    # -------------------------------------------------------------------
    # Zones (map frame, metres)
    # -------------------------------------------------------------------
    # These are filtered in pixel space by the tracker node, so they
    # still need to be pixel coordinates here.
    # Set to {} to disable zone filtering and use only the topdown viz zones.
    zones: "{}"

topdown_viz:
  ros__parameters:

    # -------------------------------------------------------------------
    # Canvas / map view
    # -------------------------------------------------------------------
    # How much of the floor to show. The canvas covers:
    #   X: map_origin_x  to  map_origin_x + map_width_m
    #   Y: map_origin_y  to  map_origin_y + map_height_m
    map_width_m:   6.0
    map_height_m:  6.0
    map_origin_x: -1.0   # map-frame X at the LEFT  edge of canvas
    map_origin_y: -3.0   # map-frame Y at the BOTTOM edge of canvas
    image_width:   640
    image_height:  640
    publish_hz:    10.0
    trail_length:  40

    # -------------------------------------------------------------------
    # Camera intrinsics  (C920 @ 640x480 — replace after calibration)
    # -------------------------------------------------------------------
    fx: 617.0
    fy: 617.0
    cx: 320.0
    cy: 240.0

    # -------------------------------------------------------------------
    # Zones (map frame, metres)
    # -------------------------------------------------------------------
    # Define zone boundaries in real-world coordinates.
    # X = forward from map origin, Y = left/right.
    # Tune these once you know where the robot arm and turtlebot operate.
    zones: >-
      {
        "arm":       [[0.0, -0.5], [0.8, -0.5], [0.8, 0.5], [0.0, 0.5]],
        "turtlebot": [[1.0, -0.8], [2.5, -0.8], [2.5, 0.8], [1.0, 0.8]]
      }
